<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

    <div class="theme-toggle-wrapper">
    <button class="toggle-switch" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <span class="toggle-thumb">
            <span class="toggle-icon" id="toggle-icon">☀️</span>
        </span>
        <span class="toggle-label" id="theme-label">Day Mode</span>
    </button>
    </div>
    <div class="container">
        <h1 id="display">00:00:00.000</h1>
        <div class="buttons">
            <button id="start_btn" onclick="startTimer()"><span>Start</span></button>
            <button id="stop_btn" onclick="stopTimer()" disabled><span>Stop</span></button>
            <button id="reset_btn" onclick="resetTimer()"><span>Reset</span></button>
        </div>
    </div>

    <div class="history-container">
        <h3>Lap History</h3>
        <table id="history-table">
            <thead>
                <tr>
                    <th>User/Attempt</th>
                    <th>Recorded Time</th>
                </tr>
            </thead>
            <tbody id="history-body">
            </tbody>
        </table>
    </div>
    
    <script src="../Scripts/script.js"></script>

    <script>
    (function () {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-label').textContent = 'Day Mode';
        document.getElementById('toggle-icon').textContent = '☀️';
    } else {
        document.getElementById('theme-label').textContent = 'Night Mode';
        document.getElementById('toggle-icon').textContent = '🌙';
    }
    })();
</script>

</body>
</html>
